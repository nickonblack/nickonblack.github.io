<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikita Grigorchuk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #1e1e2e;
  --gutter:  #2a2a3d;
  --border:  #313150;
  --cursor-ln: #2d2d4a;
  --text:    #cdd6f4;
  --muted:   #6c7086;
  --comment: #585b70;
  --kw:      #cba6f7;   /* purple  — const/let/class */
  --type:    #89b4fa;   /* blue    — types */
  --str:     #a6e3a1;   /* green   — strings */
  --num:     #fab387;   /* peach   — numbers */
  --fn:      #89dceb;   /* sky     — functions/methods */
  --prop:    #f38ba8;   /* red     — angular decorator / property */
  --accent:  #dd0031;   /* angular red */
  --ts:      #3178c6;
  --mono: 'Source Code Pro', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 15px;
  line-height: 1.75;
  overflow-x: hidden;
}

/* ── scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ══════════════════════════════════════════
   TAB BAR (VS Code style)
══════════════════════════════════════════ */
.tabbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  height: 38px;
  background: #181825;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  padding: 0 0 0 52px; /* offset past gutter */
  gap: 0;
  user-select: none;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabbar::-webkit-scrollbar { display: none; }

.tab {
  height: 38px;
  padding: 0 1.1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 12px;
  color: var(--muted);
  border-right: 1px solid var(--border);
  cursor: pointer;
  transition: color 0.15s, background 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}

.tab.active {
  background: var(--bg);
  color: var(--text);
  border-top: 1px solid var(--accent);
}

.tab:not(.active):hover { background: #232336; color: var(--text); }

.tab-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
}
.tab-dot.ts  { background: var(--ts); }
.tab-dot.ng  { background: var(--accent); }
.tab-dot.md  { background: var(--str); }

/* ══════════════════════════════════════════
   SIDEBAR (file tree hint)
══════════════════════════════════════════ */
.sidebar {
  position: fixed;
  top: 38px; left: 0; bottom: 0;
  width: 52px;
  background: #181825;
  border-right: 1px solid var(--border);
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 1rem;
  gap: 1.4rem;
}

.sidebar-icon {
  width: 32px; height: 32px;
  opacity: 0.35;
  transition: opacity 0.2s;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: var(--text);
}
.sidebar-icon:hover { opacity: 0.8; }
.sidebar-icon.active { opacity: 1; color: var(--text); }

/* ══════════════════════════════════════════
   EDITOR LAYOUT
══════════════════════════════════════════ */
.editor {
  margin-top: 38px;
  margin-left: 52px;
  min-height: calc(100vh - 38px);
  display: flex;
  flex-direction: column;
}

.pane {
  display: none;
  flex: 1;
}
.pane.active { display: block; }

/* ── line-number gutter ── */
.code-body {
  display: flex;
  min-height: 100%;
}

.gutter {
  width: 52px;
  min-width: 52px;
  background: var(--bg);
  text-align: right;
  padding: 2rem 0.9rem 6rem 0;
  color: var(--comment);
  font-size: 13px;
  line-height: 1.75rem;
  user-select: none;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}

.code-content {
  flex: 1;
  padding: 2rem 2rem 6rem 2rem;
  overflow-x: auto;
}

/* ── lines ── */
.line {
  display: block;
  height: 1.75rem;
  line-height: 1.75rem;
  white-space: pre;
  padding: 0 0.5rem;
  border-radius: 2px;
  transition: background 0.1s;
}
.line:hover { background: rgba(255,255,255,0.025); }
.line.highlight { background: var(--cursor-ln); }

.ln { /* inline line number for mobile fallback */
  min-width: 2.5rem;
  color: var(--comment);
  font-size: 13px;
  user-select: none;
  flex-shrink: 0;
  display: none;
}

.ind { display: inline-block; width: 2ch; }
.ind2 { display: inline-block; width: 4ch; }

/* ── syntax ── */
.kw    { color: var(--kw); }
.type  { color: var(--type); }
.str   { color: var(--str); }
.num   { color: var(--num); }
.fn    { color: var(--fn); }
.prop  { color: var(--prop); }
.cmt   { color: var(--comment); font-style: italic; }
.punct { color: var(--muted); }
.plain { color: var(--text); }
.dec   { color: var(--prop); }   /* decorator */
.link  { color: var(--type); text-decoration: none; border-bottom: 1px solid rgba(137,180,250,0.35); transition: border-color 0.2s; }
.link:hover { border-color: var(--type); }
.link.mail { color: var(--str); border-color: rgba(166,227,161,0.35); }
.link.mail:hover { border-color: var(--str); }

/* ── cursor blink ── */
.cursor {
  display: inline-block;
  width: 2px;
  height: 1.1em;
  background: var(--text);
  vertical-align: text-bottom;
  margin-left: 1px;
  animation: blink 1.1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── status bar ── */
.statusbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 24px;
  background: #45475a;
  display: flex;
  align-items: center;
  padding: 0 1rem 0 calc(52px + 1rem);
  gap: 1.5rem;
  font-size: 11px;
  color: rgba(255,255,255,0.9);
  z-index: 200;
  letter-spacing: 0.03em;
  white-space: nowrap;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.statusbar::-webkit-scrollbar { display: none; }
.statusbar > span,
.statusbar-right > span {
  white-space: nowrap;
  flex-shrink: 0;
}
.statusbar-right {
  margin-left: auto;
  display: flex;
  gap: 1.5rem;
  opacity: 0.85;
  flex-shrink: 0;
}

/* ══════════════════════════════════════════
   FADE-IN ANIMATION for lines
══════════════════════════════════════════ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateX(-6px); }
  to   { opacity: 1; transform: translateX(0); }
}

.line {
  opacity: 0;
  animation: fadeIn 0.25s ease forwards;
}

/* ══════════════════════════════════════════
   MOBILE
══════════════════════════════════════════ */
@media (max-width: 640px) {
  .sidebar { width: 40px; }
  .tabbar  { padding-left: 40px; }
  .editor  { margin-left: 40px; }
  .gutter  { width: 36px; min-width: 36px; padding: 1.2rem 0.6rem 5rem 0; font-size: 11px; }
  .code-content { padding: 1.2rem 1rem 5rem 1rem; font-size: 13px; }
  .tab { font-size: 11px; padding: 0 0.7rem; }
  html { font-size: 13px; }
  .statusbar {
    height: calc(24px + env(safe-area-inset-bottom));
    padding: 0 max(0.6rem, env(safe-area-inset-right)) env(safe-area-inset-bottom) calc(40px + max(0.6rem, env(safe-area-inset-left)));
    gap: 0.75rem;
    font-size: 10px;
  }
  .statusbar-right { gap: 0.75rem; }
  .statusbar > span:nth-child(3) { display: none; } /* hide Angular version on narrow screens */
  .statusbar-right > span:last-child { display: none; } /* hide email on narrow screens */
}
</style>

//  RENDER
// ══════════════════════════════════════════

function renderPane(id) {
  const lines = TABS[id];
  const gutter = document.getElementById('gutter-' + id);
  const content = document.getElementById('content-' + id);
  if (!lines || gutter.childElementCount > 0) return;

  let gutterHTML = '';
  let contentHTML = '';

  lines.forEach((line, i) => {
    const delay = (i * 18) + 'ms';
    const hlClass = line.highlight ? ' highlight' : '';
    gutterHTML += `<div class="line${hlClass}" style="animation-delay:${delay}">${i + 1}</div>`;
    contentHTML += `<div class="line${hlClass}" style="animation-delay:${delay}">${line.html || '&ZeroWidthSpace;'}</div>`;
  });

  gutter.innerHTML = gutterHTML;
  content.innerHTML = contentHTML;

  // update status bar col
  const lastLine = lines.length;
  document.querySelector('.statusbar-right span:nth-child(2)').textContent =
    `Ln ${lastLine}, Col 1`;
}

function switchTab(id) {
  // tabs
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  // panes
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + id).classList.add('active');
  renderPane(id);
}

// boot
renderPane('home');
